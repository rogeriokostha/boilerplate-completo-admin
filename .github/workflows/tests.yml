name: Django Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            db:
                image: postgres:16
                env:
                    POSTGRES_DB: test_db
                    POSTGRES_USER: test_user
                    POSTGRES_PASSWORD: test_pass
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U test_user -d test_db"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: 📦 Clonar repositório
              uses: actions/checkout@v4

            - name: 🐍 Configurar Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: 📦 Instalar dependências
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install psycopg2-binary

            - name: ⚙️ Configurar variáveis de ambiente
              run: |
                  echo "DATABASE_URL=postgres://test_user:test_pass@localhost:5432/test_db" >> $GITHUB_ENV
                  echo "DJANGO_SETTINGS_MODULE=core_base.settings.base" >> $GITHUB_ENV

            - name: 🧪 Rodar testes Django
              run: |
                  python manage.py migrate
                  python manage.py test
